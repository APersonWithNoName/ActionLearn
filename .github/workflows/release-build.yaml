name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'Release v')

    steps:
      - uses: actions/checkout@v4  # 也建议升级 checkout
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_PAT }}

      - name: Extract version from commit message
        id: extract_version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -n "$VERSION" ]; then
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "BRANCH=release/$VERSION" >> $GITHUB_ENV
            echo "✅ Found version: $VERSION"
          else
            echo "❌ No version found in commit message, skipping..."
            exit 78
          fi

      - name: Setup build environment
        run: sh EnvSetup.sh

      - name: Build project
        run: sh Build.sh

      - name: Run tests
        run: sh RunTest.sh

      - name: Generate release notes
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ env.VERSION }}^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="$PREV_TAG..${{ env.VERSION }}"
          else
            LOG_RANGE="${{ env.VERSION }}"
          fi

          cat > release_notes.md << EOF
          ## Release ${{ env.VERSION }}

          ### 自动构建信息
          - **版本**: ${{ env.VERSION }}
          - **构建时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **触发分支**: main

          ### 变更内容
          $(git log --pretty=format:"- %s" $LOG_RANGE)
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # 升级到 v4
        with:
          name: build-${{ env.VERSION }}
          path: |
            dist/
            !dist/**/*.log
          retention-days: 7
          compression-level: 6  # v4 支持的新参数
          if-no-files-found: warn  # v4 支持的新参数

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2  # 也升级到 v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            dist/*
            release_notes.md
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

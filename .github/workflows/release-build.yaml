name: Release Build

permissions:
  contents: write
  actions: read
  checks: read
  pull-requests: read

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    #if: contains(github.event.head_commit.message, 'Release v') && contains(github.event.head_commit.message, 'Merge development into main')
    if: contains(github.event.head_commit.message, 'Release v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_PAT }}

      - name: Extract version from commit message
        id: extract_version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # 从 "Release v1.0.8: Merge development into main" 中提取版本
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -n "$VERSION" ]; then
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "BRANCH=release/$VERSION" >> $GITHUB_ENV
            echo "Found version: $VERSION"
          else
            echo "No version found in commit message, skipping..."
            exit 78
          fi

      - name: Display release info
        run: |
          echo "Building release for tag: ${{ env.VERSION }}"
          echo "Using branch: ${{ env.BRANCH }}"
          echo "Current directory: $(pwd)"
          echo "Files:"
          ls -la

      - name: Simulate setup build environment
        run: |
          echo "🔧 [SIMULATE] Setting up build environment..."
          # 模拟 EnvSetup.sh
          echo "  - Installing dependencies..."
          echo "  - Configuring environment..."
          echo "  - Setup complete"

          # 创建模拟的构建输出目录
          mkdir -p dist
          echo "✅ Setup simulation complete"

      - name: Simulate build project
        run: |
          echo "[SIMULATE] Building project for version ${{ env.VERSION }}..."

          # 模拟构建过程
          echo "  - Compiling source files..."
          echo "  - Linking libraries..."
          echo "  - Optimizing assets..."

          # 创建模拟的构建产物
          echo "Build artifact for ${{ env.VERSION }}" > dist/app-${{ env.VERSION }}.txt
          echo "Build completed at $(date)" >> dist/app-${{ env.VERSION }}.txt
          echo "Version: ${{ env.VERSION }}" >> dist/version.info

          # 创建一些模拟的文件
          for i in 1 2 3; do
            echo "Sample content $i" > dist/file${i}.bin
          done

          echo "Build simulation complete"
          echo "Build artifacts created:"
          ls -la dist/

      - name: Simulate run tests
        run: |
          echo "🧪 [SIMULATE] Running tests..."

          # 模拟测试过程
          echo "  - Running unit tests... PASSED (42/42)"
          echo "  - Running integration tests... PASSED (15/15)"
          echo "  - Running performance tests... PASSED"
          echo "  - Code coverage: 87%"

          # 创建测试报告
          cat > test-report.txt << EOF
          Test Report for ${{ env.VERSION }}
          =================================
          Date: $(date)
          Unit Tests: 42 passed, 0 failed
          Integration Tests: 15 passed, 0 failed
          Performance: All tests passed
          Coverage: 87%
          EOF

      - name: Generate release notes
        run: |
          echo "Generating release notes..."

          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ env.VERSION }}^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="$PREV_TAG..${{ env.VERSION }}"
            echo "Previous tag: $PREV_TAG"
          else
            LOG_RANGE="${{ env.VERSION }}"
            echo "First release"
          fi

          # 生成发布说明
          cat > release_notes.md << EOF
          ## 🎉 Release ${{ env.VERSION }}

          ### 自动构建信息
          - **版本**: ${{ env.VERSION }}
          - **构建时间**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **触发分支**: main
          - **触发方式**: ${{ github.event_name }}

          ### 变更内容
          $(git log --pretty=format:"- %s" $LOG_RANGE 2>/dev/null || echo "- Initial release")

          ### 构建产物
          本次发布包含以下构建产物：
          - \`app-${{ env.VERSION }}.txt\`: 主应用程序
          - \`file1.bin\`, \`file2.bin\`, \`file3.bin\`: 二进制组件
          - \`version.info\`: 版本信息文件

          ### 测试结果
          - 单元测试: 42/42 通过
          - 集成测试: 15/15 通过
          - 性能测试: 全部通过
          - 代码覆盖率: 87%

          ### 如何部署
          \`\`\`bash
          # 下载发布包
          gh release download ${{ env.VERSION }}

          # 验证版本
          cat version.info
          \`\`\`
          EOF

          echo "✅ Release notes generated"
          echo "----------------------------"
          cat release_notes.md
          echo "----------------------------"

      - name: Upload build artifacts (simulated)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.VERSION }}
          path: |
            dist/
            test-report.txt
            release_notes.md
          retention-days: 7
          if-no-files-found: warn
          compression-level: 6

      - name: Create GitHub Release (simulated)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }} (Simulated)
          body_path: release_notes.md
          files: |
            dist/*
            test-report.txt
          draft: false
          prerelease: ${{ contains(env.VERSION, '-beta') || contains(env.VERSION, '-alpha') || contains(env.VERSION, '-rc') }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-release summary
        if: success()
        run: |
          echo "Release simulation completed successfully! ✅✅✅"
          echo "==================================================="
          echo "Release: ${{ env.VERSION }}"
          echo "Branch: ${{ env.BRANCH }}"
          echo "Time: $(date)"
          echo "==================================================="
          echo ""
          echo "Artifacts uploaded:"
          ls -la dist/ test-report.txt 2>/dev/null || echo "No artifacts found"

      - name: Handle failure
        if: failure()
        run: |
          echo "Release simulation failed"
          echo "Version: ${{ env.VERSION }}"
          exit 1

name: Release Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'  # 忽略 workflow 文件本身的修改

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # 只在包含版本标签的推送时触发
    if: contains(github.event.head_commit.message, 'Release v')

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTION_PAT }}

      - name: Extract version from commit message
        id: extract_version
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # 从 "Release v1.0.8: Merge development into main" 中提取版本
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)

          if [ -n "$VERSION" ]; then
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "BRANCH=release/$VERSION" >> $GITHUB_ENV
            echo "✅ Found version: $VERSION"
          else
            echo "❌ No version found in commit message, skipping..."
            exit 78  # 中性退出码，不会标记为失败
          fi

      - name: Setup build environment
        run: echo "Setup"

      - name: Build project
        run: echo "Build"

      - name: Run tests
        run: echo "Test"

      - name: Generate release notes
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ env.VERSION }}^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="$PREV_TAG..${{ env.VERSION }}"
          else
            LOG_RANGE="${{ env.VERSION }}"
          fi

          cat > release_notes.md << EOF
          ## Release ${{ env.VERSION }}
          $(git log --pretty=format:"- %s" $LOG_RANGE)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            dist/*
            release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Sync Branch "Development" to Branch "main"

on:
  push:
    branches:
      - development
    tags:
      - "v*.*.*"

jobs:
  sync_to_main:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Debug secrets
        run: |
          echo "ACTION_PAT exists: ${{ secrets.ACTION_PAT != '' }}"
          echo "GITHUB_TOKEN exists: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"

      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          token: ${{ secrets.ACTION_PAT }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "branch=release/$TAG" >> $GITHUB_OUTPUT

      - name: Force sync to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 强制同步 main 到 development
          git fetch origin development
          git branch -f main development
          git push origin main --force

      - name: Create release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从标签创建 release 分支
          git checkout -b ${{ steps.tag.outputs.branch }} ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.branch }} --force

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 创建 release（如果不存在）
          gh release create ${{ steps.tag.outputs.name }} \
            --title "Release ${{ steps.tag.outputs.name }}" \
            --notes "Auto release from tag ${{ steps.tag.outputs.name }}\n- main synced to development\n- branch: ${{ steps.tag.outputs.branch }}" \
            --target main || echo "Release already exists"
